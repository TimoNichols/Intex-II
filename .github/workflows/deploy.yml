name: Deploy Full App
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      # ── BACKEND (.NET 10) ──────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      - name: Publish Backend
        run: |
          dotnet publish Backend/Intex.Api/Intex.Api.csproj -c Release -o publish
          rm publish/appsettings.Development.json || true
      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: intex-4-14
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
      # ── FRONTEND (Vite/React) ──────────────────────
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Build Frontend
        run: |
          cd Frontend
          npm install
          npm run build
      - name: Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "Frontend"
          output_location: "dist"
      # ── ML API (FastAPI / Python) ──────────────────
      - name: Deploy ML API
        uses: azure/webapps-deploy@v2
        with:
          app-name: intex-ml-api
          publish-profile: ${{ secrets.AZURE_ML_API_PUBLISH_PROFILE }}
          package: ml-pipelines-v2
