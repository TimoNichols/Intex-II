<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="waterG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62a5d1"/>
      <stop offset="100%" stop-color="#3d7fa8"/>
    </linearGradient>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf2"/>
      <stop offset="100%" stop-color="#e4f2fb"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#skyG)"/>

  <!-- Sun / horizon glow -->
  <circle cx="16" cy="17" r="3.5" fill="#ffdf6b" opacity="0.25"/>

  <!-- Mast -->
  <line x1="16" y1="7" x2="16" y2="22" stroke="#3d7fa8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Main sail -->
  <path d="M16 8 L26 20 L16 20 Z" fill="#62a5d1" opacity="0.9"/>

  <!-- Jib sail -->
  <path d="M16 10 L8 19 L16 19 Z" fill="#fffcf2" stroke="#62a5d1" stroke-width="0.5"/>

  <!-- Hull -->
  <path d="M8 21 Q16 25 24 21 L23 23 Q16 27 9 23 Z" fill="#3d7fa8"/>
  <!-- Hull sheen -->
  <path d="M10 21.8 Q16 24 22 21.8" fill="none" stroke="#fffcf2" stroke-width="0.5" opacity="0.4"/>

  <!-- Water -->
  <path d="M0 24 Q4 22.5 8 24 Q12 25.5 16 24 Q20 22.5 24 24 Q28 25.5 32 24 L32 32 L0 32 Z" fill="url(#waterG)"/>
  <!-- Wave ripples -->
  <path d="M2 26 Q6 24.5 10 26 Q14 27.5 18 26 Q22 24.5 26 26 Q28 26.8 30 26" fill="none" stroke="#fffcf2" stroke-width="0.6" opacity="0.45"/>

  <!-- Border ring -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="#62a5d1" stroke-width="1" opacity="0.4"/>
</svg>
